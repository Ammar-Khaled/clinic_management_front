<div class="min-h-screen bg-surface flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-2xl">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-4">
        <span class="material-symbols-outlined text-on-primary text-3xl">clinical_notes</span>
      </div>
      <h1 class="text-3xl font-headline font-extrabold text-blue-900">Create Your Account</h1>
      <p class="text-slate-500 text-sm mt-1 font-label">Join Clinical Curator to manage your health</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-3xl shadow-sm shadow-blue-900/5 p-8">

      <!-- Error -->
      <div *ngIf="errorMsg"
           class="mb-6 p-4 rounded-2xl bg-error-container text-on-error-container text-sm font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">error</span>
        {{ errorMsg }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-8">

        <!-- Section 1: Account -->
        <div>
          <h3 class="text-lg font-headline font-bold text-blue-900 mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">account_circle</span>
            Account Information
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Username *</label>
              <input formControlName="username"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="johndoe" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Email *</label>
              <input formControlName="email" type="email"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="john@example.com" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">First Name *</label>
              <input formControlName="first_name"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="John" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Last Name *</label>
              <input formControlName="last_name"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="Doe" />
            </div>
            <div class="md:col-span-2">
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Password *</label>
              <input formControlName="password" type="password"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="Min 8 characters" />
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-outline-variant/20"></div>

        <!-- Section 2: Medical Profile -->
        <div>
          <h3 class="text-lg font-headline font-bold text-blue-900 mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">health_and_safety</span>
            Medical Profile
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Date of Birth *</label>
              <input formControlName="date_of_birth" type="date"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Gender *</label>
              <select formControlName="gender"
                      class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary">
                <option value="">Select...</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Phone *</label>
              <input formControlName="phone_number"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="+20 1xx xxx xxxx" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Height (cm) *</label>
              <input formControlName="height" type="number"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="170" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Weight (kg) *</label>
              <input formControlName="weight" type="number"
                     class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary"
                     placeholder="70" />
            </div>
            <div>
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Blood Type</label>
              <select formControlName="blood_type"
                      class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary">
                <option value="">Select...</option>
                <option *ngFor="let bt of bloodTypes" [value]="bt">{{ bt }}</option>
              </select>
            </div>
            <div class="md:col-span-3">
              <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Allergies</label>
              <textarea formControlName="allergies" rows="2"
                        class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm focus:ring-2 focus:ring-primary resize-none"
                        placeholder="List any known allergies..."></textarea>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit"
                [disabled]="form.invalid || loading"
                class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl py-3.5 font-headline font-bold text-sm shadow-lg shadow-primary/20 hover:shadow-xl transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span *ngIf="loading" class="material-symbols-outlined animate-spin text-sm">progress_activity</span>
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <!-- Login Link -->
      <p class="text-center mt-6 text-sm text-slate-500">
        Already have an account?
        <a routerLink="/login" class="text-primary font-semibold hover:underline">Sign In</a>
      </p>
    </div>
  </div>
</div>
