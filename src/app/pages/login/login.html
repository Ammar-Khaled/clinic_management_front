<div class="min-h-screen bg-surface flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-4">
        <span class="material-symbols-outlined text-on-primary text-3xl">clinical_notes</span>
      </div>
      <h1 class="text-3xl font-headline font-extrabold text-blue-900">Clinical Curator</h1>
      <p class="text-slate-500 text-sm mt-1 font-label">Sign in to your patient portal</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-3xl shadow-sm shadow-blue-900/5 p-8">

      <!-- Success Message -->
      <div *ngIf="successMsg"
           class="mb-6 p-4 rounded-2xl bg-secondary-fixed/30 text-on-secondary-fixed-variant text-sm font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">check_circle</span>
        {{ successMsg }}
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMsg"
           class="mb-6 p-4 rounded-2xl bg-error-container text-on-error-container text-sm font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">error</span>
        {{ errorMsg }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Username -->
        <div>
          <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
            <input formControlName="username"
                   class="w-full pl-10 pr-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary"
                   placeholder="Enter your username" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
            <input formControlName="password" type="password"
                   class="w-full pl-10 pr-4 py-3 rounded-xl bg-surface-container-low border-0 text-sm text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary"
                   placeholder="Enter your password" />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit"
                [disabled]="form.invalid || loading"
                class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl py-3.5 font-headline font-bold text-sm shadow-lg shadow-primary/20 hover:shadow-xl transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span *ngIf="loading" class="material-symbols-outlined animate-spin text-sm">progress_activity</span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <!-- Sign Up Links -->
      <div class="mt-8 space-y-4 pt-4 border-t border-outline-variant/20">
        <p class="text-center text-sm text-slate-500">
          New patient?
          <a routerLink="/signup" class="text-primary font-semibold hover:underline">Create Patient Account</a>
        </p>
        <p class="text-center text-sm text-slate-500">
          Professional?
          <a routerLink="/doctor-signup" class="text-primary font-semibold hover:underline">Register as Doctor</a>
        </p>
      </div>
    </div>
  </div>
</div>
